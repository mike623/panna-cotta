name: test

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: cargo test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: packages/desktop/src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri

      - name: cargo test
        if: matrix.os != 'windows-latest'
        run: cargo test --all-features

      - name: cargo build (windows compile check)
        if: matrix.os == 'windows-latest'
        run: cargo build --all-features

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  vitest:
    name: vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/desktop/package-lock.json

      - run: npm ci

      - run: npm test -- --run

  playwright-admin:
    name: playwright admin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/desktop/package-lock.json

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright admin tests
        run: npx playwright test

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-admin-report
          path: packages/desktop/playwright-report/
          retention-days: 7

  playwright-lan:
    name: playwright lan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xvfb

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/desktop/package-lock.json

      - name: Install npm deps
        working-directory: packages/desktop
        run: npm ci

      - name: Build frontend
        working-directory: packages/desktop
        run: npm run build

      - name: Build Tauri release binary
        working-directory: packages/desktop/src-tauri
        run: cargo build --release

      - name: Install Playwright browsers
        working-directory: packages/desktop
        run: npx playwright install --with-deps chromium

      - name: Run Playwright LAN tests
        working-directory: packages/desktop
        run: xvfb-run -a npx playwright test --config=e2e-lan/playwright.config.ts

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-lan-report
          path: packages/desktop/playwright-report/
          retention-days: 7

  smoke-linux:
    name: smoke (linux)
    runs-on: ubuntu-latest
    needs: [rust, vitest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            webkit2gtk-driver \
            xvfb

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/desktop/package-lock.json

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Install npm deps
        working-directory: packages/desktop
        run: npm ci

      - name: Build Tauri app
        working-directory: packages/desktop
        run: npm run tauri build

      - name: Install smoke deps
        working-directory: packages/desktop/smoke
        run: npm install --no-audit --no-fund

      - name: Run smoke test (xvfb)
        working-directory: packages/desktop/smoke
        run: xvfb-run -a npx wdio run wdio.conf.ts

      - name: Upload smoke artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-linux-logs
          path: |
            packages/desktop/smoke/logs/
            packages/desktop/smoke/screenshots/
          retention-days: 7
          if-no-files-found: ignore
