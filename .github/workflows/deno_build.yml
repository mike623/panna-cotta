name: Deno Build and Release

on:
  push:
    branches:
      - "release/*"
    tags:
      - "v*"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Format check
        run: deno fmt --check
        working-directory: packages/backend

      - name: Lint
        run: deno lint
        working-directory: packages/backend

      - name: Test
        run: deno test --allow-read --allow-env --allow-net --allow-run --allow-sys
        working-directory: packages/backend

  build:
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Compile Deno application
        run: deno compile -A --target ${{ matrix.target }} --include packages/frontend --output stream-backend packages/backend/server.ts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stream-backend-${{ matrix.target }}
          path: stream-backend

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename binaries
        run: |
          mv artifacts/stream-backend-x86_64-unknown-linux-gnu/stream-backend artifacts/stream-backend-linux-x86_64
          mv artifacts/stream-backend-x86_64-apple-darwin/stream-backend artifacts/stream-backend-macos-x86_64
          mv artifacts/stream-backend-aarch64-apple-darwin/stream-backend artifacts/stream-backend-macos-aarch64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            artifacts/stream-backend-linux-x86_64
            artifacts/stream-backend-macos-x86_64
            artifacts/stream-backend-macos-aarch64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
