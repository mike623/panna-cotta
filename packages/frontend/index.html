<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
    >
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Stream Deck">
    <meta name="theme-color" content="#000000">
    <title>Stream Deck</title>
    <link rel="manifest" href="/apps/manifest.json">
    <link rel="icon" href="/apps/assets/favicon.ico">
    <link rel="apple-touch-icon" href="/apps/assets/apple-touch-icon.png">
    <link rel="stylesheet" href="/apps/reset.css">
    <link rel="stylesheet" href="/apps/style.css">
    <link rel="preconnect" href="https://unpkg.com">
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="dark-mode">
    <div id="grid-container" class="grid-container"></div>

    <div id="main-toolbar" class="main-toolbar hidden">
      <div id="toolbar-buttons" class="toolbar-buttons">
        <button id="prev-page" class="toolbar-button">
          <i data-lucide="arrow-left"></i>
        </button>
        <span id="page-indicator" class="page-indicator"></span>
        <button id="toggle-theme" class="toolbar-button">
          <i data-lucide="sun"></i>
        </button>
        <button id="toggle-view" class="toolbar-button">
          <i data-lucide="list"></i>
        </button>
        <button id="next-page" class="toolbar-button">
          <i data-lucide="arrow-right"></i>
        </button>
      </div>
      <button id="collapse-toolbar" class="toolbar-button collapse-button">
        <i data-lucide="chevron-down"></i>
      </button>
    </div>

    <button id="expand-toolbar" class="toolbar-button expand-button">
      <i data-lucide="chevron-up"></i>
    </button>

    <button id="tauri-close" class="tauri-close hidden" aria-label="Close">
      <i data-lucide="x"></i>
    </button>

    <script src="/apps/app.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/apps/sw.js").catch((err) => {
          console.warn("SW registration failed:", err);
        });
      }
    </script>
  </body>
</html>
